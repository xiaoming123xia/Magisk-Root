name: Magisk Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Magisk APK
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew :apk:assembleRelease -PabiList=arm64-v8a --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: magisk-apk
          path: app/apk/build/outputs/apk/release/apk-release.apk
