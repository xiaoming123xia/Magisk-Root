name: Magisk Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Magisk APK
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/ndk
          cd $ANDROID_SDK_ROOT/ndk
          curl -L -o ondk.tar.xz "https://github.com/topjohnwu/ondk/releases/download/r30.0/ondk-r30.0-linux.tar.xz"
          tar -xf ondk.tar.xz
          mv ondk-r30.0 magisk
          rm ondk.tar.xz

      - name: Create config.prop
        run: |
          cat > config.prop << 'EOF'
          version=30.7
          magisk.versionCode=30700
          magisk.stubVersion=30.7
          abiList=arm64-v8a
          EOF

      - name: Build Magisk
        run: |
          chmod +x build.py
          python3 build.py -r all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: magisk-apk
          path: out/app-release.apk
